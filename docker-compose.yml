services:

  # ── FastAPI backend (Member 1's azure_api.py) ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:cached
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── Streamlit frontend (Member 3's UI) ────────────────────────────────────
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.frontend
  #   ports:
  #     - "8502:8501"
  #   volumes:
  #     - ./app:/app/app:cached
  #   env_file:
  #     - .env
  #   depends_on:
  #     - api
  #   restart: on-failure

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  db:
    image: ankane/pgvector
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-doc_explorer}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  postgres_data:
